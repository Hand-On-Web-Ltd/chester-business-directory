<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chester Business Directory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🏛️ Chester Business Directory</h1>
    <p>Discover local businesses in Chester, UK</p>
  </header>
  <div class="container">
    <div class="controls">
      <input type="text" id="search" placeholder="Search businesses...">
    </div>
    <div id="categories" class="categories"></div>
    <div id="grid" class="grid"></div>
  </div>
  <div id="modal" class="modal">
    <div id="modalBody" class="modal-content"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
